<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>가치를 올리는 디자이너 김현지</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #cc6666;
            text-align: center;
            color: #ffffff;
        }

        .container {
            padding: 40px 20px;
        }

        h1 {
            border: 2px solid #ffffff;
            border-radius: 30px;
            display: inline-block;
            padding: 12px 30px;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            margin: 20px 0;
            background-color: #eee;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .button {
            display: block;
            width: 260px;
            margin: 15px auto;
            padding: 15px;
            background-color: #e6ccff; /* 연보라 */
            color: #333;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.2s;
        }

        .button:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 제목 -->
        <h1>가치를 올리는 디자이너 김현지</h1>

        <!-- 👇 제목 바로 아래로 이동 -->
        <img src="images/스크린샷 2026-04-20 090614.png" alt="프로필 이미지" class="profile-img">

        <!-- 자기소개 -->
        <p>
            브랜드의 가치와 매력을 올리겠습니다.<br>
            임팩트로 소비자를 사로잡도록 노력하겠습니다.
        </p>

        <!-- 버튼 -->
        <a href="#" class="button">Trend</a>
        <a href="#" class="button">News</a>
        <a href="#" class="button">Issue</a>
    </div>
</body>
</html>
